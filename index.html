<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Task Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Task Flow">

  <style>
    body { 
      background: #0d1110; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      font-family: -apple-system, sans-serif; 
      color: #fff; 
    }

    .container { 
      text-align: center; 
      padding: 20px; 
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* [수정] 아이콘 찌그러짐 절대 방지 설정 */
    .icon-preview { 
      width: 120px; 
      height: 120px; 
      aspect-ratio: 1 / 1; /* 강제로 1:1 비율 고정 */
      border-radius: 26px; 
      box-shadow: 0 12px 40px rgba(0,0,0,0.7); 
      margin-bottom: 25px; 
      border: 1px solid #212924;
      object-fit: cover; /* 이미지가 정사각이 아니더라도 꽉 채움 */
      flex-shrink: 0; /* 부모 요소에 의해 줄어들지 않음 */
    }

    h2 { color: #a5d6a7; margin-bottom: 12px; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    p { color: #888; font-size: 15px; line-height: 1.6; margin: 0; max-width: 250px; }
    .footer { position: fixed; bottom: 50px; font-size: 13px; color: #444; }
    
    #install-ui, #loading-ui { display: none; }

    .flowing-text { 
      color: #1b5e20; 
      font-weight: bold; 
      font-size: 1.1em; 
      letter-spacing: 4px; 
      animation: pulse 1.5s infinite ease-in-out; 
    }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>

  <script>
    // [확인] 본인의 실제 Google Apps Script 배포 URL을 정확히 넣으세요
    const APP_URL = "https://klausjg.github.io/taskflow/";

    function init() {
      const isStandalone = window.navigator.standalone === true || 
                           window.matchMedia('(display-mode: standalone)').matches;

      if (isStandalone) {
        document.getElementById('loading-ui').style.display = 'block';
        // 런처에서 앱으로 넘어가는 딜레이를 약간 줍니다
        setTimeout(() => {
          window.location.replace(APP_URL);
        }, 400);
      } else {
        document.getElementById('install-ui').style.display = 'block';
      }
    }
  </script>
</head>
<body onload="init()">

  <div id="install-ui" class="container">
    <img src="icon.png" class="icon-preview">
    <h2>Task Flow</h2>
    <p>세련된 업무 경험을 위해<br><strong>'홈 화면에 추가'</strong>를 해주세요.</p>
    <div class="footer">설치 후 아이콘을 눌러 실행하세요.</div>
  </div>

  <div id="loading-ui" class="container">
    <div class="flowing-text">FLOWING...</div>
  </div>

</body>
</html>
