<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Task Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Task Flow">

  <style>
    body { background: #0d1110; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; color: #fff; overflow: hidden; }
    .container { text-align: center; padding: 20px; transition: opacity 0.5s; }
    .icon-preview { width: 120px; height: 120px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #212924; }
    h2 { color: #a5d6a7; margin-bottom: 10px; }
    p { color: #888; font-size: 14px; line-height: 1.6; }
    .footer { position: fixed; bottom: 40px; font-size: 12px; color: #555; }
    #install-ui { display: none; } /* 기본적으로 숨김 */
  </style>

  <script>
    const APP_URL = "https://klausjg.github.io/taskflow/";

    function init() {
      // 1. 홈 화면에서 실행되었는지 확인 (Standalone 모드)
      const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

      if (isStandalone) {
        // [실행 모드] 이미 설치된 상태라면 즉시 구글 웹앱으로 이동
        window.location.href = APP_URL;
      } else {
        // [설치 모드] 일반 브라우저 접속이라면 안내 화면 노출
        document.getElementById('install-ui').style.display = 'block';
        document.getElementById('loading-ui').style.display = 'none';
      }
    }
  </script>
</head>
<body onload="init()">

  <div id="install-ui" class="container">
    <img src="icon.png" class="icon-preview">
    <h2>Task Flow</h2>
    <p>더 빠르고 간편한 업무 관리를 위해<br><strong>'홈 화면에 추가'</strong>를 해주세요.</p>
    <div class="footer">아이콘 추가 후에는 앱처럼 바로 실행됩니다.</div>
  </div>

  <div id="loading-ui" class="container">
    <div style="color: #1b5e20; font-weight: bold; font-size: 1.2em; letter-spacing: 2px;">FLOWING...</div>
  </div>

</body>
</html>
