name: TaskFlow Release

on:
  workflow_dispatch:
    inputs:
      rev:
        description: "새 rev 번호 (비워두면 자동 +1)"
        required: false
        type: string
      title:
        description: "릴리즈 타이틀 (비우면 RELEASE_NOTES.md의 '이번 릴리즈 요약' 자동 사용)"
        required: false
        type: string
      notes:
        description: "(선택) 짧은 노트. 비우면 RELEASE_NOTES.md 사용"
        required: false
        type: string

permissions:
  contents: write
  models: read

jobs:
  bump:
    uses: klausjg/flow-workflows/.github/workflows/bump-version.yml@main
    with:
      rev: ${{ inputs.rev }}
      title: ${{ inputs.title }}
      notes: ${{ inputs.notes }}
      app_name: "TaskFlow"
      app_description: "작업 흐름 관리 앱"
      fallback_title: "TaskFlow 업데이트"
      source_repo: klausjg/taskflow-source
    secrets:
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
