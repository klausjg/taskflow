name: Notify Notion on Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  notify:
    uses: klausjg/flow-workflows/.github/workflows/notify-notion.yml@main
    with:
      app_name:    "TaskFlow"
      app_page_id: "348b783a-96a1-81a2-a776-fef707ffe71e"
    secrets:
      NOTION_TOKEN:          ${{ secrets.NOTION_TOKEN }}
      NOTION_RELEASES_DB_ID: ${{ secrets.NOTION_RELEASES_DB_ID }}
